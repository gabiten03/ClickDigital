<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Cardumen - Lento y Amplio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #07090E;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #94A3B8;
            font-family: sans-serif;
            pointer-events: none;
        }
        .info span { color: #10B981; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info">Movimiento <span>lento</span> y radio de atracción <span>amplio</span>.</div>
    <canvas id="boidsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('boidsCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let boids = [];
        
        const colors = ['#10B981', '#14B8A6', '#3B82F6', '#6EE7B7', '#F1F5F9'];

        let mouse = { x: -1000, y: -1000, active: false };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        window.addEventListener('mouseout', () => {
            mouse.active = false;
        });

        class Boid {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 1. VELOCIDAD MUCHO MÁS LENTA
                this.maxSpeed = Math.random() * 1.0 + 1.5; // Rango de 1.5 a 2.5 (antes era de 3.5 a 5.5)
                
                // 2. GIROS MÁS SUAVES
                this.maxForce = 0.05; // Antes era 0.15, ahora giran con mucha más inercia
                
                this.wanderTheta = Math.random() * Math.PI * 2;
            }

            update() {
                let ax = 0;
                let ay = 0;

                if (mouse.active) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    // 3. RADIO DE ACCIÓN MÁS GRANDE (Sienten el mouse hasta a 600px de distancia)
                    if (dist > 0 && dist < 600) {
                        let desiredVx = (dx / dist) * this.maxSpeed;
                        let desiredVy = (dy / dist) * this.maxSpeed;
                        
                        // 4. RADIO DE MERODEO MÁS AMPLIO (Empiezan a orbitar/frenar a los 250px)
                        if(dist < 250) {
                            desiredVx *= (dist / 250);
                            desiredVy *= (dist / 250);
                        }

                        let steerX = desiredVx - this.vx;
                        let steerY = desiredVy - this.vy;
                        
                        let steerMag = Math.sqrt(steerX * steerX + steerY * steerY);
                        if (steerMag > this.maxForce) {
                            steerX = (steerX / steerMag) * this.maxForce;
                            steerY = (steerY / steerMag) * this.maxForce;
                        }
                        
                        ax += steerX * 1.2;
                        ay += steerY * 1.2;
                    } else {
                        // Si están fuera del radio de 600px, vagan libres
                        this.wander();
                        ax += this.wanderAx;
                        ay += this.wanderAy;
                    }
                } else {
                    this.wander();
                    ax += this.wanderAx;
                    ay += this.wanderAy;
                }

                // COMPORTAMIENTO: SEPARACIÓN
                let sepX = 0, sepY = 0, count = 0;
                let desiredSeparation = 30; // Un poco más de espacio entre ellos
                
                for (let other of boids) {
                    if (other === this) continue;
                    let dx = this.x - other.x;
                    let dy = this.y - other.y;
                    let d = Math.sqrt(dx * dx + dy * dy);
                    
                    if (d > 0 && d < desiredSeparation) {
                        sepX += (dx / d) / d; 
                        sepY += (dy / d) / d;
                        count++;
                    }
                }
                
                if (count > 0) {
                    sepX /= count;
                    sepY /= count;
                    let sepMag = Math.sqrt(sepX * sepX + sepY * sepY);
                    if (sepMag > 0) {
                        sepX = (sepX / sepMag) * this.maxSpeed;
                        sepY = (sepY / sepMag) * this.maxSpeed;
                        
                        let steerX = sepX - this.vx;
                        let steerY = sepY - this.vy;
                        
                        let steerMag = Math.sqrt(steerX * steerX + steerY * steerY);
                        if (steerMag > this.maxForce) {
                            steerX = (steerX / steerMag) * this.maxForce;
                            steerY = (steerY / steerMag) * this.maxForce;
                        }
                        ax += steerX * 2.0;
                        ay += steerY * 2.0;
                    }
                }

                // Aplicar aceleración a la velocidad
                this.vx += ax;
                this.vy += ay;

                // Limitar velocidad
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            wander() {
                // Vagabundeo mucho más lento y tranquilo
                this.wanderTheta += (Math.random() - 0.5) * 0.15;
                this.wanderAx = Math.cos(this.wanderTheta) * this.maxForce * 0.3;
                this.wanderAy = Math.sin(this.wanderTheta) * this.maxForce * 0.3;

                let margin = 100;
                let turnFactor = 0.2;
                if (this.x < margin) this.wanderAx += turnFactor;
                if (this.x > width - margin) this.wanderAx -= turnFactor;
                if (this.y < margin) this.wanderAy += turnFactor;
                if (this.y > height - margin) this.wanderAy -= turnFactor;
            }

            draw() {
                let angle = Math.atan2(this.vy, this.vx);
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                ctx.roundRect(-3.5, -1.5, 7, 3, 1.5);
                ctx.fill();
                
                ctx.restore();
            }
        }

        let numBoids = (window.innerWidth < 768) ? 80 : 150;
        for (let i = 0; i < numBoids; i++) {
            boids.push(new Boid(Math.random() * window.innerWidth, Math.random() * window.innerHeight));
        }

        function animate() {
            // Opacidad en 0.2 para dejar una estela un poco más larga por la baja velocidad
            ctx.fillStyle = 'rgba(7, 9, 14, 0.25)';
            ctx.fillRect(0, 0, width, height);

            for (let boid of boids) {
                boid.update();
                boid.draw();
            }
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
